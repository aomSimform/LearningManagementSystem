<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Course Details</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a href="../index.html" class="navbar-brand"> ← Back to Dashboard </a>
      </div>
    </nav>

    <div class="container mt-4">
      <div id="errorBox" class="alert alert-danger d-none"></div>

      <!-- Course Details -->
      <div id="course-details" class="card shadow-sm mb-4">
        <div class="card-body">Loading course...</div>
      </div>

      <!-- Subsections -->
      <div class="card shadow-sm">
        <div class="card-header">
          <h4>Subsections</h4>
        </div>

        <div class="card-body">
          <div id="subsection-list">Loading subsections...</div>
        </div>
      </div>
    </div>

    <script type="module">
      const params = new URLSearchParams(window.location.search);

      const courseId = params.get("id");

      const errorBox = document.getElementById("errorBox");

      const token = localStorage.getItem("access");

      if (!courseId) {
        errorBox.textContent = "Missing course id";

        errorBox.classList.remove("d-none");

        throw new Error("Missing course id");
      }

      /*
LOAD COURSE DETAILS
*/
      try {
        const courseResponse = await fetch(
          `http://127.0.0.1:8000/courses/${courseId}/`,
          {
            headers: {
              Authorization: token ? `Bearer ${token}` : "",
            },
          },
        );

        const courseData = await courseResponse.json();

        if (!courseResponse.ok) {
          throw courseData;
        }

        document.getElementById("course-details").innerHTML = `
 <div class="card-body">

   <h2>
    ${courseData.title}
   </h2>

   <p class="text-muted">
    Instructor:
    ${courseData.instructor}
   </p>

   <p>
    ${courseData.description}
   </p>

   <span
    class="
     badge
     bg-secondary
    "
   >
     Course ID:
     ${courseData.id}
   </span>

 </div>
 `;
      } catch (error) {
        errorBox.textContent = error.detail || "Could not load course";

        errorBox.classList.remove("d-none");
      }

      /*
LOAD SUBSECTIONS + ASSIGNMENTS
*/
      try {
        const subsectionResponse = await fetch(
          `http://127.0.0.1:8000/courses/${courseId}/subsections/`,
          {
            headers: {
              Authorization: token ? `Bearer ${token}` : "",
            },
          },
        );

        const subsections = await subsectionResponse.json();

        if (!subsectionResponse.ok) {
          throw subsections;
        }

        /*
Sort by order
*/
        subsections.sort((a, b) => a.order - b.order);

        let list = `<div class="list-group">`;

        for (const subsection of subsections) {
          list += `

<div
class="
list-group-item
mb-4
"
>

<div
class="
d-flex
justify-content-between
"
>

<h5>
${subsection.topic}
</h5>


<span
class="
badge bg-primary
"
>
Order:
${subsection.order}
</span>

</div>


<p class="mb-3">
${subsection.description}
</p>

`;

          /*
ASSIGNMENTS
*/
          if (subsection.assignments && subsection.assignments.length) {
            list += `
<div class="mt-3">

<h6>
Assignments
</h6>
`;

            for (const assignment of subsection.assignments) {
              list += `

<div
class="
card
mt-2
p-3
border
"
>

<h6>
${assignment.title}
</h6>


<p class="mb-1">
<strong>
File:
</strong>

${assignment.file_name}
</p>



<p class="mb-1">
<strong>
Size:
</strong>

${(assignment.file_size / 1024 / 1024).toFixed(2)}
MB
</p>



<p class="mb-3">
<strong>
Deadline:
</strong>

${new Date(assignment.deadline).toLocaleString()}
</p>



<div class="d-flex gap-2">


<a
href="
${assignment.assignment_url}
"
target="_blank"

class="
btn btn-sm
btn-outline-primary
"
>
Open Assignment
</a>


<button
class="
btn btn-sm
btn-success
"

onclick="
window.location.href=
'submit-assignment.html?course_id=${subsection.course}&subsection_id=${subsection.id}&assignment_id=${assignment.id}'
"
>
Submit Assignment
</button>


</div>


</div>

`;
            }

            list += `
</div>
`;
          } else {
            list += `

<small
class="
text-muted
"
>
No assignments
</small>

`;
          }

          list += `
</div>
`;
        }

        list += `</div>`;

        document.getElementById("subsection-list").innerHTML = list;
      } catch (error) {
        console.error(error);

        document.getElementById("subsection-list").innerHTML =
          "Failed to load subsections.";
      }
    </script>
  </body>
</html>
