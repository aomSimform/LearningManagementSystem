<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Course Details</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a href="../index.html" class="navbar-brand"> ← Back to Dashboard </a>
      </div>
    </nav>

    <div class="container mt-4">
      <div id="errorBox" class="alert alert-danger d-none"></div>

      <!-- Course -->
      <div id="course-details" class="card shadow-sm mb-4">
        <div class="card-body">Loading course...</div>
      </div>

      <!-- Create Subsection -->
      <div id="create-subsection-box" style="display: none" class="mb-3">
        <div class="card shadow-sm p-3">
          <h5>Create Subsection</h5>

          <form id="subsectionForm">
            <input
              id="topic"
              class="form-control mb-2"
              placeholder="Topic"
              required
            />

            <textarea
              id="subsection_description"
              class="form-control mb-2"
              placeholder="Description"
              required
            ></textarea>

            <input
              type="number"
              id="order"
              class="form-control mb-2"
              placeholder="Order"
              required
            />

            <button id="createSubBtn" class="btn btn-success" type="submit">
              Create Subsection
            </button>
          </form>
        </div>
      </div>

      <!-- Subsections -->
      <div class="card shadow-sm">
        <div class="card-header">
          <h4>Subsections</h4>
        </div>

        <div class="card-body">
          <div id="subsection-list">Loading subsections...</div>
        </div>
      </div>
    </div>

    <script type="module">
      import * as auth from "../js/auth/authCheck.js";

      const user = await auth.default();

      const params = new URLSearchParams(window.location.search);

      const courseId = params.get("id");

      const token = localStorage.getItem("access");

      const errorBox = document.getElementById("errorBox");

      if (!courseId) {
        errorBox.textContent = "Missing course id";

        errorBox.classList.remove("d-none");

        throw new Error("Missing course id");
      }

      /*
Instructor controls
*/
      const isInstructor = user && user.role === "instructor";

      if (isInstructor) {
        document.getElementById("create-subsection-box").style.display =
          "block";
      }

      /*
Load course
*/
      try {
        const response = await fetch(
          `http://127.0.0.1:8000/courses/${courseId}/`,
          {
            headers: {
              Authorization: token ? `Bearer ${token}` : "",
            },
          },
        );

        const courseData = await response.json();

        if (!response.ok) {
          throw courseData;
        }

        document.getElementById("course-details").innerHTML = `
<div class="card-body">

<h2>
${courseData.title}
</h2>

<p class="text-muted">
Instructor:
${courseData.instructor}
</p>

<p>
${courseData.description}
</p>

</div>
`;
      } catch (error) {
        errorBox.textContent = error.detail || "Could not load course";

        errorBox.classList.remove("d-none");
      }

      async function loadSubsections() {
        try {
          const response = await fetch(
            `http://127.0.0.1:8000/courses/${courseId}/subsections/`,
            {
              headers: {
                Authorization: token ? `Bearer ${token}` : "",
              },
            },
          );

          const subsections = await response.json();

          if (!response.ok) {
            throw subsections;
          }

          subsections.sort((a, b) => a.order - b.order);

          let list = `<div class="list-group">`;

          for (const subsection of subsections) {
            list += `

<div
class="
list-group-item
mb-4
"
>

<div
class="
d-flex
justify-content-between
align-items-center
"
>

<div>

<h5>
${subsection.topic}
</h5>

<span
class="
badge bg-primary
"
>
Order:
${subsection.order}
</span>

</div>


${
  isInstructor
    ? `
<button
class="
btn btn-sm
btn-warning
"
onclick="
window.location.href=
'add-assignment.html?course_id=${subsection.course}&subsection_id=${subsection.id}'
"
>
Add Assignment
</button>
`
    : ""
}

</div>


<p class="mt-3">
${subsection.description}
</p>

`;

            /*
Assignments
*/
            if (subsection.assignments && subsection.assignments.length) {
              for (const assignment of subsection.assignments) {
                list += `

<div
class="
card mt-2 p-3
"
>

<h6>
${assignment.title}
</h6>

<p>
${assignment.file_name}
</p>


<div class="d-flex gap-2">

<a
href="${assignment.assignment_url}"
target="_blank"
class="
btn btn-sm
btn-outline-primary
"
>
Open Assignment
</a>


<button
class="
btn btn-sm
btn-success
"
onclick="
window.location.href=
'submit-assignment.html?course_id=${subsection.course}&subsection_id=${subsection.id}&assignment_id=${assignment.id}'
"
>
Submit Assignment
</button>

</div>

</div>

`;
              }
            } else {
              list += `
<small>
No assignments
</small>
`;
            }

            list += `
</div>
`;
          }

          list += `</div>`;

          document.getElementById("subsection-list").innerHTML = list;
        } catch (error) {
          document.getElementById("subsection-list").innerHTML =
            "Failed loading subsections";
        }
      }

      /*
Initial load
*/
      await loadSubsections();

      /*
Create subsection
*/
      document
        .getElementById("subsectionForm")
        ?.addEventListener("submit", async function (e) {
          e.preventDefault();

          const btn = document.getElementById("createSubBtn");

          btn.disabled = true;

          btn.innerText = "Creating...";

          try {
            const payload = {
              topic: document.getElementById("topic").value,

              description: document.getElementById("subsection_description")
                .value,

              order: parseInt(document.getElementById("order").value),
            };

            const response = await fetch(
              `http://127.0.0.1:8000/courses/${courseId}/subsections/`,
              {
                method: "POST",

                headers: {
                  "Content-Type": "application/json",

                  Authorization: `Bearer ${token}`,
                },

                body: JSON.stringify(payload),
              },
            );

            const data = await response.json();

            if (!response.ok) {
              throw data;
            }

            document.getElementById("subsectionForm").reset();

            await loadSubsections();
          } catch (error) {
            errorBox.textContent =
              error.detail || "Could not create subsection";

            errorBox.classList.remove("d-none");
          } finally {
            btn.disabled = false;

            btn.innerText = "Create Subsection";
          }
        });
    </script>
  </body>
</html>
