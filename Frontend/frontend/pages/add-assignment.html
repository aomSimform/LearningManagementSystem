<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Add Assignment</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a href="javascript:history.back()" class="navbar-brand"> ← Back </a>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow p-4">
            <h3 class="mb-4">Add Assignment</h3>

            <div id="errorBox" class="alert alert-danger d-none"></div>

            <div id="successBox" class="alert alert-success d-none"></div>

            <div id="infoBox" class="alert alert-info">Loading...</div>

            <form id="assignmentForm">
              <div class="mb-3">
                <label class="form-label"> Title </label>

                <input type="text" id="title" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label"> Upload File </label>

                <input
                  type="file"
                  id="assignmentFile"
                  class="form-control"
                  accept=".pdf,.jpg,.jpeg,.png"
                  required
                />

                <small class="text-muted"> Allowed: PDF, JPG, PNG </small>
              </div>

              <div class="mb-3">
                <label class="form-label"> Deadline </label>

                <input
                  type="datetime-local"
                  id="deadline"
                  class="form-control"
                  required
                />
              </div>

              <button
                type="submit"
                id="createBtn"
                class="btn btn-success w-100"
              >
                Create Assignment
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      const params = new URLSearchParams(window.location.search);

      /*
YOUR PARAM NAMES
*/
      const courseId = params.get("courseid");

      const subsectionId = params.get("subsectionid");

      const token = localStorage.getItem("access");

      const errorBox = document.getElementById("errorBox");

      const successBox = document.getElementById("successBox");

      const infoBox = document.getElementById("infoBox");

      if (!courseId || !subsectionId) {
        errorBox.textContent = "Missing query parameters";

        errorBox.classList.remove("d-none");

        throw new Error("Missing params");
      }

      /*
Show params
*/
      infoBox.innerHTML = `
<strong>
Course:
</strong>
${courseId}

<br>

<strong>
Subsection:
</strong>
${subsectionId}
`;

      /*
YOUR API
*/
      const assignmentUrl = `http://127.0.0.1:8000/courses/${courseId}/subsections/${subsectionId}/assignments/`;

      document
        .getElementById("assignmentForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          errorBox.classList.add("d-none");

          successBox.classList.add("d-none");

          const btn = document.getElementById("createBtn");

          const fileInput = document.getElementById("assignmentFile");

          if (!fileInput.files.length) {
            errorBox.textContent = "Select a file";

            errorBox.classList.remove("d-none");

            return;
          }

          const file = fileInput.files[0];

          /*
File validation
*/
          const allowedTypes = ["application/pdf", "image/jpeg", "image/png"];

          if (!allowedTypes.includes(file.type)) {
            errorBox.textContent = "Only PDF, JPG, PNG allowed";

            errorBox.classList.remove("d-none");

            return;
          }

          btn.disabled = true;

          btn.innerText = "Creating...";

          try {
            const formData = new FormData();

            formData.append("title", document.getElementById("title").value);

            /*
required field name
*/
            formData.append("uploaded_file", file);

            formData.append(
              "deadline",
              new Date(document.getElementById("deadline").value).toISOString(),
            );

            const response = await fetch(assignmentUrl, {
              method: "POST",

              headers: {
                Authorization: `Bearer ${token}`,
              },

              body: formData,
            });

            const data = await response.json();

            if (!response.ok) {
              throw data;
            }

            successBox.textContent = "Assignment created successfully";

            successBox.classList.remove("d-none");

            setTimeout(() => {
              window.location.href = `course.html?id=${courseId}`;
            }, 1500);
          } catch (error) {
            errorBox.textContent =
              error.detail ||
              JSON.stringify(error) ||
              "Assignment creation failed";

            errorBox.classList.remove("d-none");
          } finally {
            btn.disabled = false;

            btn.innerText = "Create Assignment";
          }
        });
    </script>
  </body>
</html>
