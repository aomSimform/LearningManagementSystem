<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow p-4" style="width: 420px">
            <h3 class="text-center mb-4">Register</h3>

            <div id="errorBox" class="alert alert-danger d-none"></div>

            <div id="successBox" class="alert alert-success d-none"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label"> Role </label>

                    <select id="role" class="form-control" required>
              <option value="student">Student</option>

              <option value="instructor">Instructor</option>
            </select>
                </div>

                <div class="mb-3">
                    <label class="form-label"> First Name </label>

                    <input type="text" id="first_name" class="form-control" required />
                </div>

                <div class="mb-3">
                    <label class="form-label"> Last Name </label>

                    <input type="text" id="last_name" class="form-control" required />
                </div>

                <div class="mb-3">
                    <label class="form-label"> Email </label>

                    <input type="email" id="email" class="form-control" required />
                </div>

                <div class="mb-3">
                    <label class="form-label"> Password </label>

                    <input type="password" id="password" class="form-control" required />
                </div>

                <div class="mb-3">
                    <label class="form-label"> Confirm Password </label>

                    <input type="password" id="confirm_password" class="form-control" required />
                </div>

                <button type="submit" id="registerBtn" class="btn btn-success w-100">
            Register
          </button>
            </form>

            <p class="text-center mt-3 mb-0">
                Already have an account?
                <a href="login.html"> Login </a>
            </p>
        </div>
    </div>

    <script>
        document
            .getElementById("registerForm")
            .addEventListener("submit", async function(e) {
                e.preventDefault();

                const errorBox = document.getElementById("errorBox");

                const successBox = document.getElementById("successBox");

                const btn = document.getElementById("registerBtn");

                errorBox.classList.add("d-none");

                successBox.classList.add("d-none");

                /*
Client-side check
*/
                const password = document.getElementById("password").value;

                const confirmPassword =
                    document.getElementById("confirm_password").value;

                if (password !== confirmPassword) {
                    errorBox.textContent = "Passwords do not match";

                    errorBox.classList.remove("d-none");

                    return;
                }

                btn.disabled = true;
                btn.innerText = "Registering...";

                try {
                    const payload = {
                        role: document.getElementById("role").value,

                        email: document.getElementById("email").value,

                        password: password,

                        confirm_password: confirmPassword,

                        first_name: document.getElementById("first_name").value,

                        last_name: document.getElementById("last_name").value,
                    };

                    const response = await fetch(
                        "http://127.0.0.1:8000/user/register/", {
                            method: "POST",

                            headers: {
                                "Content-Type": "application/json",
                            },

                            body: JSON.stringify(payload),
                        },
                    );

                    const data = await response.json();

                    if (!response.ok) {
                        throw data;
                    }


                    if (data.access) {
                        localStorage.setItem("access", data.access);

                        localStorage.setItem("refresh", data.refresh);

                        window.location.href = "../index.html";

                        return;
                    }


                    successBox.textContent = "Registration successful";

                    successBox.classList.remove("d-none");

                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                } catch (error) {
                    errorBox.textContent =
                        error.detail || JSON.stringify(error) || "Registration failed";

                    errorBox.classList.remove("d-none");
                } finally {
                    btn.disabled = false;

                    btn.innerText = "Register";
                }
            });
    </script>
</body>

</html>
