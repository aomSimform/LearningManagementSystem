<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand" href="#">
LMS Dashboard
</a>


            <div class="ms-auto">

                <button id="login-btn" class="
btn btn-primary
me-2
not-loggedin
" style="display:none">
Login
</button>


                <button id="register-btn" class="
btn btn-success
me-2
not-loggedin
" style="display:none">
Register
</button>


                <button id="logout-btn" class="btn btn-danger" style="display:none">
Logout
</button>

            </div>

        </div>

    </nav>




    <div class="container mt-4">

        <div id="loggedin" style="display:none" class="mb-4">

            <div class="alert alert-info">

                <h4 id="username">
                    Hello:
                </h4>

            </div>

        </div>



        <div id="create-course-box" style="display:none" class="mb-3">

            <button class="btn btn-success" id="create-course-btn">
Create Course
</button>

        </div>



        <div id="courseError" class="
alert alert-danger
d-none
mb-3
"></div>




        <div class="card shadow-sm">

            <div class="card-header">
                <h4>
                    Available Courses
                </h4>
            </div>

            <div class="card-body">
                <div id="course-list">
                    Loading courses...
                </div>
            </div>

        </div>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="./js/dashboard.js"></script>

</body>

</html>
