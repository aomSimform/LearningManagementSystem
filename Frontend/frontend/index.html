<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Dashboard</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet" />
    </head>

    <body class="bg-light">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">LMS Dashboard</a>

                <div class="ms-auto">
                    <button id="login-btn"
                        class="btn btn-primary me-2 not-loggedin"
                        style="display: none">
                        Login
                    </button>

                    <button id="register-btn"
                        class="btn btn-success not-loggedin"
                        style="display: none">
                        Register
                    </button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <div id="loggedin" style="display: none" class="mb-4">
                <div class="alert alert-info">
                    <h4 id="username">Hello:</h4>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header">
                    <h4>Available Courses</h4>
                </div>

                <div class="card-body">
                    <div id="course-list">Loading courses...</div>
                </div>
            </div>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <script type="module">
        import * as auth from "./js/auth/authCheck.js"; const user = await auth.default(); if (!user) { const buttons = document.getElementsByClassName("not-loggedin"); for (const item of buttons) { item.style.display = "inline-block"; } } if (user) { document.getElementById("username").textContent
        += user.user.first_name + " " + user.user.last_name; document.getElementById("loggedin").style.display = "block"; } const api_courses = "http://127.0.0.1:8000/courses/"; const courses = await fetch(api_courses) .then((response) => response.json())
        .catch((error) => console.log(error)); console.log(courses); let list = `
        <div class="list-group">`; for (const course of courses) { list += `
            <div class="list-group-item mb-3">
                <h5>${course.title}</h5>
                <p class="mb-1">${course.description}</p>
            </div>
            `; } list += `</div>`; document.getElementById("course-list").innerHTML = list;
    </script>
    </body>

</html>
